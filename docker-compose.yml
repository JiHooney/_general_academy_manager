services:
  postgres:
    image: postgres:15-alpine
    container_name: gam_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: gam
      POSTGRES_PASSWORD: gam_secret
      POSTGRES_DB: schedule_mvp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gam -d schedule_mvp"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: gam_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
